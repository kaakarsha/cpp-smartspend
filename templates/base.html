<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpendSmart — Finance Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --emerald: #00C896;
            --emerald-light: #00E6AD;
            --emerald-dark: #00A87F;
            --sky: #38BDF8;
            --amber: #FBBF24;
            --rose: #FB7185;
            --ink: #0F172A;
            --ink-soft: #1E293B;
            --ink-muted: #334155;
            --glass: rgba(255,255,255,0.08);
            --glass-border: rgba(255,255,255,0.12);
            --surface: rgba(255,255,255,0.97);
            --text-primary: #0F172A;
            --text-muted: #64748B;
        }

        * {
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1, h2, h3, h4, h5, h6, .brand-text {
            font-family: 'Syne', sans-serif;
        }

        body {
            background: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        .main-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 2.5rem;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--emerald);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-brand span {
            font-family: 'Syne', sans-serif;
            color: #fff;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.45rem 1rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            letter-spacing: 0.01em;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
            background: var(--glass);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-user-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 0.4rem 1rem 0.4rem 0.5rem;
            color: #fff;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .nav-user-btn:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .nav-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--emerald), var(--sky));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            color: #fff;
        }

        .dropdown-menu {
            background: var(--ink-soft);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-top: 0.5rem;
        }

        .dropdown-item {
            color: rgba(255,255,255,0.75);
            border-radius: 8px;
            padding: 0.5rem 0.9rem;
            font-size: 0.875rem;
            transition: all 0.15s;
        }

        .dropdown-item:hover {
            background: var(--glass);
            color: #fff;
        }

        /* ── PAGE WRAPPER ── */
        .page-wrapper {
            flex: 1;
            padding-top: 68px;
            width: 100%;
        }

        /* ── FOOTER ── */
        .main-footer {
            background: var(--ink-soft);
            border-top: 1px solid var(--glass-border);
            padding: 1.25rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .main-footer p {
            color: rgba(255,255,255,0.35);
            font-size: 0.8rem;
            margin: 0;
        }

        .footer-brand {
            font-family: 'Syne', sans-serif;
            color: var(--emerald);
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* ── MOBILE NAV TOGGLE ── */
        .nav-toggle {
            display: none;
            background: none;
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 0.35rem 0.7rem;
            border-radius: 8px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .main-nav {
                padding: 0 1.25rem;
            }
            .nav-toggle {
                display: block;
            }
            .nav-center {
                display: none;
                position: absolute;
                top: 68px;
                left: 0;
                right: 0;
                background: rgba(15,23,42,0.97);
                border-bottom: 1px solid var(--glass-border);
                padding: 1rem;
            }
            .nav-center.open {
                display: block;
            }
            .nav-links {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- NAVBAR -->
    <nav class="main-nav">
        <a class="nav-brand" href="#">Spend<span>Smart</span></a>

        <div class="nav-center" id="navCenter">
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}"><i class="fas fa-chart-pie me-1"></i> Dashboard</a></li>
                <li><a href="{{ url_for('transactions') }}"><i class="fas fa-exchange-alt me-1"></i> Transactions</a></li>
                <li><a href="{{ url_for('statistics') }}"><i class="fas fa-chart-bar me-1"></i> Statistics</a></li>
            </ul>
        </div>

        <div class="nav-right">
            <div class="dropdown">
                <a class="nav-user-btn dropdown-toggle" href="#" role="button" id="userDropdown"
                   data-bs-toggle="dropdown" aria-expanded="false">
                    <div class="nav-avatar">{{ username[0].upper() if username else 'U' }}</div>
                    {{ username }}
                </a>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                    <li><a class="dropdown-item" href="{{ url_for('profile') }}"><i class="fas fa-user me-2 text-emerald"></i>Profile</a></li>
                    <li><a class="dropdown-item" href="{{ url_for('edit_profile') }}"><i class="fas fa-sliders-h me-2"></i>Edit Profile</a></li>
                    <li><hr class="dropdown-divider" style="border-color:rgba(255,255,255,0.1)"></li>
                    <li><a class="dropdown-item" href="{{ url_for('logout') }}" style="color:var(--rose)"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
            <button class="nav-toggle" id="navToggle"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page-wrapper">
        {% block content %}{% endblock %}
    </div>

    <!-- FOOTER -->
    <footer class="main-footer">
        <span class="footer-brand">SpendSmart</span>
        <p>SpendSmart smarter. Spend wiser.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script>
        document.getElementById('navToggle')?.addEventListener('click', () => {
            document.getElementById('navCenter').classList.toggle('open');
        });
    </script>
</body>
</html>
